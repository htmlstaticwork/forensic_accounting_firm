<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="img/logo.png">
    <title>Login | TruthSeekers Portal</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">

    <div class="auth-controls">
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Dark Mode">
            <i class="fa-solid fa-circle-half-stroke"></i>
        </button>
        <button id="rtl-toggle" class="theme-toggle-btn" aria-label="Toggle RTL Mode">
            <i class="fa-solid fa-language"></i>
        </button>
    </div>

    <div class="login-card">
        <div class="login-header">
            <a href="index.html" class="brand-logo" style="justify-content: center; margin-bottom: 0.5rem;">
                <img src="img/logo.png" alt="Logo">
                <span>TruthSeekers</span>
            </a>
            <h2>Secure Portal Access</h2>
        </div>

        <div class="social-login-grid">
            <button class="social-btn google">
                <i class="fa-brands fa-google"></i> Google
            </button>
            <button class="social-btn linkedin">
                <i class="fa-brands fa-linkedin"></i> LinkedIn
            </button>
        </div>

        <div class="login-divider">OR</div>

        <form action="dashboard.html" method="GET">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="name@company.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" required placeholder="••••••••">
                    <i class="fa-solid fa-eye-slash toggle-password"></i>
                </div>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-size: 0.9rem;">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: var(--text-sub);">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" style="color: var(--secondary-color);">Forgot Password?</a>
            </div>

            <button type="submit" class="btn" style="width: 100%;">Sign In</button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.95rem; color: var(--text-sub);">
            Don't have an account? <a href="register.html" style="color: var(--secondary-color); font-weight: 600;">Sign Up</a>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
